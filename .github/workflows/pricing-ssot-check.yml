name: Pricing SSOT Consistency Check

on:
  workflow_dispatch:
  schedule:
    # 매일 KST 01:20 (UTC 16:20)
    - cron: "20 16 * * *"
  push:
    branches: ["main", "master"]
    paths:
      - "web/backend/controllers/requests/dashboard.controller.js"
      - "web/backend/controllers/admin/admin.dashboard.controller.js"
      - "web/backend/services/pricingReferralOrderBucket.service.js"
      - "web/backend/services/pricingReferralSnapshot.service.js"
      - "web/backend/services/pricingSsotHealth.service.js"
      - "web/backend/models/pricingSsotHealthSnapshot.model.js"
      - "web/backend/scripts/db/check-pricing-ssot-consistency.js"
      - "web/backend/jobs/dailyReferralSnapshotWorker.js"
      - "web/backend/package.json"

jobs:
  pricing-ssot-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix web/backend ci

      - name: Run pricing SSOT strict check
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          DB_URI="$MONGODB_URI"
          if [ -z "$DB_URI" ]; then
            DB_URI="$MONGO_URI"
          fi

          if [ -z "$DB_URI" ]; then
            echo "MONGODB_URI or MONGO_URI secret is required for pricing SSOT check." >&2
            exit 1
          fi

          MONGODB_URI="$DB_URI" MONGO_URI="$DB_URI" npm --prefix web/backend run db:check-pricing-ssot:ci
